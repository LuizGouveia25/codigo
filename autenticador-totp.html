<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticador TOTP Jurídico</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- bcryptjs -->
    <script src="https://unpkg.com/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .totp-code {
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.05em;
        }

        .progress-bar {
            transition: width 1s linear, background-color 0.3s ease;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700 fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-900/50 rounded-full mb-4">
                    <i class="ph ph-lock-key text-blue-500 text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Acesso Jurídico</h1>
                <p class="text-slate-400 mt-2">Identifique-se para acessar o token</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Usuário</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <i class="ph ph-user"></i>
                        </span>
                        <input type="text" id="username" required
                            class="block w-full pl-10 pr-3 py-3 bg-slate-900 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-white placeholder-slate-500 transition-all outline-none"
                            placeholder="Seu usuário">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Senha</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                            <i class="ph ph-password"></i>
                        </span>
                        <input type="password" id="password" required
                            class="block w-full pl-10 pr-3 py-3 bg-slate-900 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-white placeholder-slate-500 transition-all outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <div id="login-error" class="hidden bg-red-900/30 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg text-sm flex items-center gap-3">
                    <i class="ph ph-warning-circle text-lg"></i>
                    <span id="error-message">Usuário ou senha incorretos.</span>
                </div>

                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 transform active:scale-[0.98] flex items-center justify-center gap-2">
                    <i class="ph ph-sign-in"></i>
                    Entrar no Sistema
                </button>
            </form>
        </div>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden flex-grow flex flex-col">
        <!-- Header -->
        <header class="bg-slate-800 border-b border-slate-700 px-6 py-4">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold">
                        <span id="user-initial">U</span>
                    </div>
                    <div>
                        <p class="text-sm text-slate-400 leading-none">Bem-vindo,</p>
                        <p class="font-semibold text-white" id="display-username">Usuário</p>
                    </div>
                </div>
                <button onclick="logout()" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                    <i class="ph ph-sign-out text-xl"></i>
                    <span class="hidden sm:inline">Sair</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow flex items-center justify-center p-6">
            <div class="w-full max-w-lg">
                <div class="bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 overflow-hidden fade-in">
                    <div class="p-8 text-center">
                        <div class="flex items-center justify-center gap-2 text-blue-400 mb-6">
                            <i class="ph ph-shield-check text-2xl"></i>
                            <span class="text-sm font-semibold uppercase tracking-wider">Token de Segurança</span>
                        </div>
                        
                        <div id="totp-container" onclick="copyToken()" class="cursor-pointer group relative py-6 px-4 rounded-2xl hover:bg-slate-900/50 transition-all duration-200">
                            <h2 id="totp-display" class="totp-code text-5xl sm:text-6xl font-bold text-white mb-2 tracking-widest">
                                000 000
                            </h2>
                            <p id="copy-feedback" class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-xs py-1 px-3 rounded-full opacity-0 transition-opacity duration-200">
                                Copiado!
                            </p>
                            <p class="text-slate-500 text-sm group-hover:text-slate-400 transition-colors flex items-center justify-center gap-1">
                                <i class="ph ph-copy"></i> Clique para copiar
                            </p>
                        </div>

                        <div class="mt-8 space-y-4">
                            <div class="flex justify-between text-sm text-slate-400 mb-1">
                                <span id="timer-text">Atualiza em 30 segundos</span>
                                <span id="timer-percent">100%</span>
                            </div>
                            <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden">
                                <div id="progress-bar" class="progress-bar h-full bg-blue-600 w-full"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 text-center">
                    <button onclick="exportLogs()" class="inline-flex items-center gap-2 text-slate-500 hover:text-slate-300 text-sm transition-colors">
                        <i class="ph ph-download-simple"></i>
                        Exportar Logs de Auditoria
                    </button>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="p-6 text-center text-slate-500 text-xs">
            &copy; 2026 Sistema Jurídico • Acesso Seguro TOTP • 
            <span id="last-update">Atualizado agora</span>
        </footer>
    </div>

    <script>
        // --- CONFIGURAÇÕES ---
        const TOTP_SECRET = "KBFG653GJI4GW3SWOZGHE32DNY2FCVSG";
        const USERS = {
            "luiz": "$2b$12$/213VyBi2is4rsU6/i.9k.B2qfurRd5S2UZVMpMxPyRXvzv.HTg/u",
            "alisson": "$2b$12$V5Xn.Y9wl1GZmxRRF9x.Au71nDeGklKDZHsmf0xZUIGrIIPU68mNe",
            "barbara": "$2b$12$3iKgiBDqtZfsdUDAkJd79.RjNIiR5MasQrhBTV6srtJI8N93FmGnC"
        };
        const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 minutos
        const MAX_LOGIN_ATTEMPTS = 5;
        const LOCKOUT_TIME_MS = 5 * 60 * 1000; // 5 minutos de bloqueio

        // --- ESTADO GLOBAL ---
        let currentTimer = null;
        let lastCode = "";

        // --- IMPLEMENTAÇÃO TOTP (Web Crypto API) ---
        async function totp(key, secs = 30, digits = 6){
            return hotp(unbase32(key), pack64bu(Math.floor(Date.now() / 1000 / secs)), digits);
        }
        async function hotp(key, counter, digits){
            let y = self.crypto.subtle;
            if(!y) throw Error('no self.crypto.subtle object available');
            let k = await y.importKey('raw', key, {name: 'HMAC', hash: 'SHA-1'}, false, ['sign']);
            return hotp_truncate(await y.sign('HMAC', k, counter), digits);
        }
        function hotp_truncate(buf, digits){
            let a = new Uint8Array(buf), i = a[19] & 0xf;
            return fmt(10, digits, ((a[i]&0x7f)<<24 | a[i+1]<<16 | a[i+2]<<8 | a[i+3]) % 10**digits);
        }
        function fmt(base, width, num){
            return num.toString(base).padStart(width, '0');
        }
        function unbase32(s){
            let t = (s.toLowerCase().replace(/\s/g, '').match(/\S/g)||[]).map(c => {
                let i = 'abcdefghijklmnopqrstuvwxyz234567'.indexOf(c);
                if(i < 0) throw Error("bad char in key");
                return fmt(2, 5, i);
            }).join('');
            if(t.length < 8) throw Error('key too short');
            return new Uint8Array(t.match(/.{8}/g).map(d => parseInt(d, 2)));
        }
        function pack64bu(v){
            let b = new ArrayBuffer(8), d = new DataView(b);
            d.setUint32(0, Math.floor(v / 2**32));
            d.setUint32(4, v & 0xFFFFFFFF);
            return b;
        }

        // --- AUDITORIA ---
        function logAction(user, action, details) {
            const logs = JSON.parse(localStorage.getItem('totp_audit_logs') || '[]');
            const now = new Date();
            const newEntry = {
                timestamp: now.toISOString(),
                localTime: now.toLocaleString('pt-BR'),
                user: user || 'SISTEMA',
                action: action,
                details: details
            };
            logs.unshift(newEntry);
            // Manter apenas os últimos 100
            if (logs.length > 100) logs.pop();
            localStorage.setItem('totp_audit_logs', JSON.stringify(logs));
        }

        function exportLogs() {
            const logs = JSON.parse(localStorage.getItem('totp_audit_logs') || '[]');
            if (logs.length === 0) {
                alert("Não há logs para exportar.");
                return;
            }

            let csv = "Data/Hora (UTC),Data/Hora (Local),Usuario,Acao,Detalhes\n";
            logs.forEach(log => {
                csv += `"${log.timestamp}","${log.localTime}","${log.user}","${log.action}","${log.details}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            const dateStr = new Date().toISOString().split('T')[0];
            
            link.setAttribute("href", url);
            link.setAttribute("download", `totp_logs_${dateStr}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            logAction(sessionStorage.getItem('currentUser'), "exportacao_logs", "Exportação de CSV realizada");
        }

        // --- CONTROLE DE ACESSO ---
        function checkLockout(username) {
            const attempts = JSON.parse(localStorage.getItem(`attempts_${username}`) || '{"count":0, "lockedUntil":0}');
            const now = Date.now();
            
            if (attempts.lockedUntil > now) {
                const remaining = Math.ceil((attempts.lockedUntil - now) / 1000 / 60);
                return remaining;
            }
            return 0;
        }

        function recordAttempt(username, success) {
            const key = `attempts_${username}`;
            const attempts = JSON.parse(localStorage.getItem(key) || '{"count":0, "lockedUntil":0}');
            
            if (success) {
                localStorage.removeItem(key);
            } else {
                attempts.count++;
                if (attempts.count >= MAX_LOGIN_ATTEMPTS) {
                    attempts.lockedUntil = Date.now() + LOCKOUT_TIME_MS;
                    attempts.count = 0;
                    logAction(username, "login_bloqueado_rate_limit", "Múltiplas tentativas falhas");
                }
                localStorage.setItem(key, JSON.stringify(attempts));
            }
        }

        // --- INTERFACE E FLUXO ---
        const loginScreen = document.getElementById('login-screen');
        const appScreen = document.getElementById('app-screen');
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');
        const errorMessage = document.getElementById('error-message');

        async function updateTOTP() {
            try {
                const code = await totp(TOTP_SECRET);
                const formattedCode = code.slice(0, 3) + " " + code.slice(3);
                
                const display = document.getElementById('totp-display');
                const progressBar = document.getElementById('progress-bar');
                const timerText = document.getElementById('timer-text');
                const timerPercent = document.getElementById('timer-percent');
                
                const now = Date.now();
                const seconds = Math.floor(now / 1000) % 30;
                const remaining = 30 - seconds;
                const percentage = (remaining / 30) * 100;

                display.textContent = formattedCode;
                progressBar.style.width = `${percentage}%`;
                timerText.textContent = `Atualiza em ${remaining} segundos`;
                timerPercent.textContent = `${Math.round(percentage)}%`;

                // Alerta visual nos últimos 5 segundos
                if (remaining <= 5) {
                    display.classList.add('text-red-500');
                    progressBar.classList.remove('bg-blue-600');
                    progressBar.classList.add('bg-red-600');
                } else {
                    display.classList.remove('text-red-500');
                    progressBar.classList.remove('bg-red-600');
                    progressBar.classList.add('bg-blue-600');
                }

                if (code !== lastCode) {
                    lastCode = code;
                    logAction(sessionStorage.getItem('currentUser'), "codigo_atualizado", "Novo código gerado");
                }

                document.getElementById('last-update').textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;

            } catch (err) {
                console.error("Erro ao gerar TOTP:", err);
            }
        }

        function copyToken() {
            const code = document.getElementById('totp-display').textContent.replace(/\s/g, '');
            navigator.clipboard.writeText(code).then(() => {
                const feedback = document.getElementById('copy-feedback');
                feedback.style.opacity = '1';
                setTimeout(() => feedback.style.opacity = '0', 2000);
                logAction(sessionStorage.getItem('currentUser'), "codigo_copiado", "Código copiado para área de transferência");
            });
        }

        function showApp() {
            const user = sessionStorage.getItem('currentUser');
            document.getElementById('display-username').textContent = user.charAt(0).toUpperCase() + user.slice(1);
            document.getElementById('user-initial').textContent = user.charAt(0).toUpperCase();
            
            loginScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            
            updateTOTP();
            currentTimer = setInterval(updateTOTP, 1000);

            // Timeout de sessão
            setTimeout(() => {
                if (sessionStorage.getItem('currentUser')) {
                    logAction(user, "sessao_expirada", "Sessão expirada automaticamente");
                    logout();
                }
            }, SESSION_TIMEOUT_MS);
        }

        function logout() {
            const user = sessionStorage.getItem('currentUser');
            if (user) logAction(user, "logout", "Usuário encerrou a sessão");
            
            sessionStorage.clear();
            clearInterval(currentTimer);
            appScreen.classList.add('hidden');
            loginScreen.classList.remove('hidden');
            loginForm.reset();
        }

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value.toLowerCase();
            const pass = document.getElementById('password').value;

            // Verificar bloqueio
            const remainingMinutes = checkLockout(user);
            if (remainingMinutes > 0) {
                loginError.classList.remove('hidden');
                errorMessage.textContent = `Conta bloqueada. Tente novamente em ${remainingMinutes} min.`;
                return;
            }

            const hash = USERS[user];
            if (hash && dcodeIO.bcrypt.compareSync(pass, hash)) {
                sessionStorage.setItem('currentUser', user);
                sessionStorage.setItem('sessionStart', Date.now());
                recordAttempt(user, true);
                logAction(user, "login_sucesso", "Acesso autorizado");
                showApp();
                loginError.classList.add('hidden');
            } else {
                recordAttempt(user, false);
                logAction(user, "login_falha", `Tentativa inválida com usuário: ${user}`);
                loginError.classList.remove('hidden');
                errorMessage.textContent = "Usuário ou senha incorretos.";
            }
        };

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            // Verificar HTTPS
            if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                alert("AVISO DE SEGURANÇA: Este aplicativo requer HTTPS para funcionar corretamente com a Web Crypto API. O uso em HTTP pode falhar.");
            }

            // Verificar sessão existente
            const user = sessionStorage.getItem('currentUser');
            const start = sessionStorage.getItem('sessionStart');
            
            if (user && start && (Date.now() - start < SESSION_TIMEOUT_MS)) {
                showApp();
            } else {
                sessionStorage.clear();
            }
        };
    </script>
</body>
</html>
