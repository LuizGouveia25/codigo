<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autenticador TOTP Jurídico</title>
    <!-- Bibliotecas Necessárias -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .totp-code { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
        .progress-bar { transition: width 1s linear, background-color 0.3s ease; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="flex-grow flex items-center justify-center p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700 fade-in">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-900/50 rounded-full mb-4">
                    <i class="ph ph-lock-key text-blue-500 text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Acesso Jurídico</h1>
                <p class="text-slate-400 mt-2">Identifique-se para acessar o token</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Usuário</label>
                    <input type="text" id="username" required class="block w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="Seu usuário">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Senha</label>
                    <input type="password" id="password" required class="block w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
                </div>
                <div id="login-error" class="hidden bg-red-900/30 border border-red-500/50 text-red-200 px-4 py-3 rounded-lg text-sm">
                    Usuário ou senha incorretos.
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-all">
                    Entrar no Sistema
                </button>
            </form>
        </div>
    </div>

    <!-- TELA DO AUTENTICADOR (Oculta inicialmente) -->
    <div id="app-screen" class="hidden flex-grow flex flex-col">
        <header class="bg-slate-800 border-b border-slate-700 px-6 py-4">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold" id="user-initial">U</div>
                    <div>
                        <p class="text-sm text-slate-400 leading-none">Bem-vindo,</p>
                        <p class="font-semibold text-white" id="display-username">Usuário</p>
                    </div>
                </div>
                <button onclick="logout()" class="text-slate-400 hover:text-white flex items-center gap-2">
                    <i class="ph ph-sign-out text-xl"></i> Sair
                </button>
            </div>
        </header>

        <main class="flex-grow flex items-center justify-center p-6">
            <div class="w-full max-w-lg bg-slate-800 rounded-3xl p-8 border border-slate-700 text-center">
                <div id="copy-area" class="cursor-pointer group py-6 px-4 rounded-2xl hover:bg-slate-900/50 transition-all relative">
                    <h2 id="totp-display" class="totp-code text-6xl font-bold text-white mb-2 tracking-widest">000 000</h2>
                    <p id="copy-feedback" class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-xs py-1 px-3 rounded-full opacity-0 transition-opacity">Copiado!</p>
                    <p class="text-slate-500 text-sm"><i class="ph ph-copy"></i> Clique para copiar</p>
                </div>
                <div class="mt-8">
                    <div class="flex justify-between text-sm text-slate-400 mb-2">
                        <span id="timer-text">Atualiza em 30s</span>
                        <span id="timer-percent">100%</span>
                    </div>
                    <div class="w-full bg-slate-900 h-3 rounded-full overflow-hidden">
                        <div id="progress-bar" class="progress-bar h-full bg-blue-600 w-full"></div>
                    </div>
                </div>
                <button onclick="exportLogs()" class="mt-8 text-slate-500 hover:text-slate-300 text-sm flex items-center gap-2 mx-auto">
                    <i class="ph ph-download-simple"></i> Exportar Logs
                </button>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÕES (Não altere os hashes abaixo)
        // ==========================================
        const TOTP_SECRET = "KBFG653GJI4GW3SWOZGHE32DNY2FCVSG";
        
        // As senhas estão protegidas por HASH BCRYPT para segurança.
        // luiz: luiz2601*
        // alisson: alisson2833*
        // barbara: barbara6782*
        const USERS = {
            "luiz": "$2b$12$/213VyBi2is4rsU6/i.9k.B2qfurRd5S2UZVMpMxPyRXvzv.HTg/u",
            "alisson": "$2b$12$V5Xn.Y9wl1GZmxRRF9x.Au71nDeGklKDZHsmf0xZUIGrIIPU68mNe",
            "barbara": "$2b$12$3iKgiBDqtZfsdUDAkJd79.RjNIiR5MasQrhBTV6srtJI8N93FmGnC"
        };

        const SESSION_TIMEOUT = 30 * 60 * 1000;
        let timer = null;

        // --- LÓGICA TOTP ---
        async function getTOTP(key) {
            const epoch = Math.floor(Date.now() / 1000);
            const counter = Math.floor(epoch / 30);
            const k = await crypto.subtle.importKey('raw', unbase32(key), {name: 'HMAC', hash: 'SHA-1'}, false, ['sign']);
            const hmac = await crypto.subtle.sign('HMAC', k, pack64(counter));
            const code = truncate(hmac);
            return code.toString().padStart(6, '0');
        }
        function truncate(buf) {
            const a = new Uint8Array(buf), i = a[19] & 0xf;
            return ((a[i]&0x7f)<<24 | a[i+1]<<16 | a[i+2]<<8 | a[i+3]) % 1000000;
        }
        function unbase32(s) {
            const b32 = "abcdefghijklmnopqrstuvwxyz234567";
            let t = s.toLowerCase().replace(/\s/g, '').split('').map(c => b32.indexOf(c).toString(2).padStart(5, '0')).join('');
            return new Uint8Array(t.match(/.{8}/g).map(d => parseInt(d, 2)));
        }
        function pack64(v) {
            const b = new ArrayBuffer(8), d = new DataView(b);
            d.setUint32(4, v);
            return b;
        }

        // --- AUDITORIA ---
        function log(action) {
            const user = sessionStorage.getItem('user') || 'SISTEMA';
            const logs = JSON.parse(localStorage.getItem('logs') || '[]');
            logs.unshift({ time: new Date().toLocaleString('pt-BR'), user, action });
            localStorage.setItem('logs', JSON.stringify(logs.slice(0, 100)));
        }

        // --- UI CONTROL ---
        async function update() {
            const code = await getTOTP(TOTP_SECRET);
            const display = document.getElementById('totp-display');
            const progress = document.getElementById('progress-bar');
            const rem = 30 - (Math.floor(Date.now() / 1000) % 30);
            
            display.textContent = code.slice(0, 3) + " " + code.slice(3);
            progress.style.width = `${(rem/30)*100}%`;
            document.getElementById('timer-text').textContent = `Atualiza em ${rem}s`;
            
            if (rem <= 5) {
                display.classList.add('text-red-500');
                progress.classList.replace('bg-blue-600', 'bg-red-600');
            } else {
                display.classList.remove('text-red-500');
                progress.classList.replace('bg-red-600', 'bg-blue-600');
            }
        }

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value.toLowerCase().trim();
            const p = document.getElementById('password').value;
            const hash = USERS[u];

            if (hash && dcodeIO.bcrypt.compareSync(p, hash)) {
                sessionStorage.setItem('user', u);
                sessionStorage.setItem('start', Date.now());
                log("login_sucesso");
                location.reload();
            } else {
                log("login_falha: " + u);
                document.getElementById('login-error').classList.remove('hidden');
            }
        };

        function logout() {
            log("logout");
            sessionStorage.clear();
            location.reload();
        }

        window.onload = () => {
            const u = sessionStorage.getItem('user');
            const s = sessionStorage.getItem('start');
            if (u && s && (Date.now() - s < SESSION_TIMEOUT)) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('display-username').textContent = u;
                document.getElementById('user-initial').textContent = u[0].toUpperCase();
                update();
                timer = setInterval(update, 1000);
            }
        };

        document.getElementById('copy-area').onclick = () => {
            const code = document.getElementById('totp-display').textContent.replace(/\s/g, '');
            navigator.clipboard.writeText(code).then(() => {
                const f = document.getElementById('copy-feedback');
                f.style.opacity = '1';
                setTimeout(() => f.style.opacity = '0', 2000);
                log("codigo_copiado");
            });
        };

        function exportLogs() {
            const logs = JSON.parse(localStorage.getItem('logs') || '[]');
            let csv = "Data,Usuario,Acao\n" + logs.map(l => `"${l.time}","${l.user}","${l.action}"`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "logs.csv";
            a.click();
        }
    </script>
</body>
</html>
